[build]
builder = "NIXPACKS"
# Using the full workspace name ensures npm finds the correct package in the monorepo
buildCommand = "npm install && npm run build --workspace=@incident-report/server"

[envs]
# Explicitly tell Nixpacks to use Node 22
NIXPACKS_NODE_VERSION = "22"

[deploy]
startCommand = "node server/dist/main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Enhanced health checks for NestJS
healthcheckPath = "/api/health"
healthcheckTimeout = 100
healthcheckInterval = 30

[env]
NODE_ENV = "production"
PORT = "3000"
