<div class="relative w-full h-full group overflow-hidden rounded-2xl border border-slate-200 shadow-inner">
  <!-- Floating Search Bar -->
  <div class="absolute top-4 left-4 right-4 z-[1000] max-w-md">
    <div class="relative shadow-2xl rounded-2xl overflow-hidden border border-slate-300 transform transition-all focus-within:ring-4 focus-within:ring-blue-100 bg-white/90 backdrop-blur-md">
      <input 
        type="text" 
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event); onSearchChange()"
        placeholder="Search for an address or landmark..." 
        class="w-full p-4 pl-12 bg-transparent text-slate-800 placeholder-slate-400 focus:outline-none font-semibold text-sm"
      />
      
      <!-- Left Icon / Spinner -->
      <div class="absolute left-4 top-1/2 -translate-y-1/2">
        @if (isGeocoding()) {
          <div class="w-5 h-5 border-2 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
        } @else {
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        }
      </div>
      
      <!-- Clear button -->
      <button *ngIf="searchQuery()" (click)="searchQuery.set(''); suggestions.set([])" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <!-- Suggestions Dropdown -->
    <div *ngIf="suggestions().length > 0" class="mt-2 bg-white/90 backdrop-blur-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden animate-in fade-in slide-in-from-top-2 duration-200 max-h-60 overflow-y-auto">
      @for (suggestion of suggestions(); track suggestion.address) {
        <button 
          (click)="selectSuggestion(suggestion)"
          class="w-full p-4 text-left border-b border-slate-100 last:border-0 hover:bg-blue-50/50 transition-colors flex items-start space-x-3 group"
        >
          <div class="mt-0.5 text-blue-400 group-hover:text-blue-600 transition-colors">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
          </div>
          <span class="text-xs font-bold text-slate-700 truncate leading-tight">{{ suggestion.address }}</span>
        </button>
      }
    </div>
  </div>

  <!-- Map Container -->
  <div id="map" class="w-full h-full cursor-crosshair bg-slate-100"></div>

  <!-- Selection Overlay Info -->
  @if (searchQuery() && !isGeocoding()) {
    <div class="absolute bottom-4 left-4 right-4 z-[1000] md:left-auto md:w-80 animate-in fade-in slide-in-from-bottom-4 duration-500">
      <div class="bg-blue-900 text-white p-5 rounded-2xl shadow-2xl border border-white/20 backdrop-blur-md">
        <p class="text-[10px] uppercase font-black tracking-widest text-blue-300 mb-1">Confirmed Location</p>
        <p class="text-xs font-bold leading-snug line-clamp-2">{{ searchQuery() }}</p>
      </div>
    </div>
  }
</div>
