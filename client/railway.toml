[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[envs]
# Ensure we use Node 22 for the frontend as well
NIXPACKS_NODE_VERSION = "22"

[deploy]
# We use 'serve' to handle production static files
startCommand = "npx -y serve -s dist/client/browser -l $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check for the frontend
healthcheckPath = "/"
healthcheckTimeout = 100
healthcheckInterval = 30
